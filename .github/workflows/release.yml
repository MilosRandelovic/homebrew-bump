name: Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the release produced by merging the automated formula-update PR.
    if: "!contains(github.event.head_commit.message, 'Update Homebrew formula for release')"
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.1'

    - name: Install dependencies
      run: go mod download

    - name: Build binary
      run: go build -o bump

    - name: Extract version
      id: version
      run: |
        VERSION=$(./bump --version | awk '{print $NF}')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        echo "Detected version: $VERSION"

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Validate version
      run: |
        if git show-ref --verify --quiet "refs/tags/${{ steps.version.outputs.tag }}"; then
          echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping release."
          echo "skip=true" >> $GITHUB_OUTPUT
          exit 0
        fi
        echo "skip=false" >> $GITHUB_OUTPUT
      id: check_tag

    - name: Get previous tag for release notes
      if: steps.check_tag.outputs.skip != 'true'
      id: previous_tag
      run: |
        git fetch --tags --prune-tags
        PREVIOUS_TAG=$(git tag -l --sort=-version:refname | head -n1 || echo "")
        echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

    - name: Create and push tag
      if: steps.check_tag.outputs.skip != 'true'
      run: |
        git tag "${{ steps.version.outputs.tag }}"
        git push origin "${{ steps.version.outputs.tag }}"

    - name: Generate release notes
      if: steps.check_tag.outputs.skip != 'true'
      id: release_notes
      run: |
        PREVIOUS_TAG="${{ steps.previous_tag.outputs.previous_tag }}"
        if [ -n "$PREVIOUS_TAG" ]; then
          NOTES=$(git log --no-merges --pretty=format:"- %s %h" ${PREVIOUS_TAG}..HEAD)
        else
          NOTES=$(git log --no-merges --pretty=format:"- %s %h" -50)
        fi
        echo "notes<<EOF" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "$NOTES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      if: steps.check_tag.outputs.skip != 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Release ${{ steps.version.outputs.tag }}
        body: ${{ steps.release_notes.outputs.notes }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update Homebrew Formula
      if: steps.check_tag.outputs.skip != 'true'
      run: |
        RELEASE_URL="https://github.com/MilosRandelovic/homebrew-bump/archive/${{ steps.version.outputs.tag }}.tar.gz"
        SHA256=$(curl -sLf "$RELEASE_URL" | sha256sum | cut -d' ' -f1)

        sed -i "s|url \".*\"|url \"$RELEASE_URL\"|" Formula/bump.rb
        sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|" Formula/bump.rb

        echo "Updated Formula/bump.rb:"
        echo "- URL: $RELEASE_URL"
        echo "- SHA256: $SHA256"

    - name: Create Pull Request for formula update
      if: steps.check_tag.outputs.skip != 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Update Homebrew formula for release ${{ steps.version.outputs.tag }}"
        title: "Update Homebrew formula for release ${{ steps.version.outputs.tag }}"
        body: |
          Automated update of the Homebrew formula for release ${{ steps.version.outputs.tag }}.

          Changes:
          - Updated URL to point to ${{ steps.version.outputs.tag }} release
          - Updated SHA256 hash

          This PR was automatically created by the release workflow.
        branch: release/update_formula_${{ steps.version.outputs.tag }}
        delete-branch: true
